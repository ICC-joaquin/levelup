<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;--border:#2a2a38;--accent:#f0c040;--accent2:#7c6aff;--accent3:#40e0c0;--text:#f0eeff;--muted:#7070a0;--danger:#ff4466;--success:#40d090;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.2;pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;min-height:100vh;}
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:380px;}
  .login-logo{font-size:26px;font-weight:800;color:var(--accent);margin-bottom:4px;letter-spacing:-0.5px;}
  .login-logo span{color:var(--text);}
  .login-sub{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:28px;letter-spacing:1px;text-transform:uppercase;}
  .login-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
  .login-tab{flex:1;padding:9px;background:none;border:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;}
  .login-tab.active{background:var(--surface2);color:var(--accent);}
  .login-field{margin-bottom:14px;}
  .login-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:6px;display:block;}
  .login-input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Syne',sans-serif;font-size:14px;outline:none;transition:border-color 0.15s;}
  .login-input:focus{border-color:var(--accent);}
  .login-btn{width:100%;padding:11px;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;border:none;border-radius:8px;cursor:pointer;margin-top:6px;transition:filter 0.15s;}
  .login-btn:hover{filter:brightness(1.1);}
  .login-err{font-size:12px;color:var(--danger);font-family:'JetBrains Mono',monospace;margin-top:10px;text-align:center;}
  header{padding:14px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:var(--accent);}
  .logo span{color:var(--text);}
  nav{margin-left:auto;display:flex;gap:3px;flex-wrap:wrap;align-items:center;}
  .nav-btn{padding:6px 13px;border:1px solid transparent;background:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;transition:all 0.15s;}
  .nav-btn:hover{color:var(--text);background:var(--surface2);}
  .nav-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(240,192,64,0.08);}
  .logout-btn{padding:6px 13px;border:1px solid rgba(255,68,102,0.3);background:none;color:var(--danger);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px;transition:all 0.15s;}
  .logout-btn:hover{background:rgba(255,68,102,0.08);}
  main{flex:1;padding:24px;max-width:1200px;width:100%;margin:0 auto;}
  .profile-wrap{max-width:520px;margin:0 auto;}
  .profile-hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center;margin-bottom:16px;}
  .avatar-ring{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;margin:0 auto 14px;border:3px solid;transition:all 0.3s;}
  .profile-name{font-size:22px;font-weight:800;margin-bottom:4px;}
  .profile-team{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:16px;}
  .profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
  .pstat{background:var(--surface2);border-radius:10px;padding:12px;text-align:center;}
  .pstat-val{font-size:20px;font-weight:800;color:var(--accent);}
  .pstat-label{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
  .tier-progress-wrap{margin-top:16px;}
  .tier-progress-bar{background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;margin-top:6px;}
  .tier-progress-fill{height:100%;border-radius:6px;transition:width 0.5s;}
  .tier-progress-label{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;margin-top:4px;}
  .edit-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px;}
  .edit-card-title{font-size:13px;font-weight:700;margin-bottom:16px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}
  .field{margin-bottom:14px;}
  .field-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:6px;display:block;}
  .field-input{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color 0.15s;}
  .field-input:focus{border-color:var(--accent);}
  .save-btn{padding:9px 20px;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;border:none;border-radius:7px;cursor:pointer;transition:filter 0.15s;}
  .save-btn:hover{filter:brightness(1.1);}
  .color-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all 0.15s;}
  .color-swatch.selected{border-color:var(--text);transform:scale(1.15);}
  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
  .stat-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
  .stat-value{font-size:26px;font-weight:800;line-height:1;}
  .stat-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;}
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .team-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
  .team-xp-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:rgba(240,192,64,0.1);padding:3px 9px;border-radius:20px;border:1px solid rgba(240,192,64,0.3);}
  .team-bar-wrap{background:var(--surface2);border-radius:4px;height:5px;margin-bottom:8px;overflow:hidden;}
  .team-bar{height:100%;border-radius:4px;}
  .lb-filters{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
  .filter-btn{padding:5px 12px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;border-radius:6px;transition:all 0.15s;}
  .filter-btn:hover,.filter-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(240,192,64,0.06);}
  .lb-table{width:100%;border-collapse:collapse;}
  .lb-table th{text-align:left;padding:9px 12px;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;border-bottom:1px solid var(--border);font-weight:400;}
  .lb-table td{padding:10px 12px;border-bottom:1px solid rgba(42,42,56,0.5);vertical-align:middle;}
  .lb-table tr:last-child td{border-bottom:none;}
  .lb-table tr:hover td{background:rgba(255,255,255,0.02);}
  .rank-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--muted);}
  .rank-num.top1{color:#ffd700;}.rank-num.top2{color:#c0c0c0;}.rank-num.top3{color:#cd7f32;}
  .xp-value{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);}
  .streak-pill{display:inline-flex;align-items:center;gap:3px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:2px 7px;border-radius:12px;background:rgba(255,100,50,0.1);color:#ff7040;border:1px solid rgba(255,100,50,0.25);}
  .streak-pill.hot{background:rgba(255,60,20,0.15);color:#ff4020;border-color:rgba(255,60,20,0.4);}
  .xp-btn{padding:5px 11px;background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.3);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;border-radius:6px;cursor:pointer;transition:all 0.15s;}
  .xp-btn:hover{background:rgba(240,192,64,0.2);}
  .teams-view-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;}
  .team-full-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  .team-full-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--surface2);}
  .member-row{display:flex;align-items:center;gap:10px;padding:9px 18px;border-bottom:1px solid rgba(42,42,56,0.4);transition:background 0.1s;}
  .member-row:last-child{border-bottom:none;}
  .member-row:hover{background:rgba(255,255,255,0.02);}
  .member-avatar{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
  .add-xp-mini{background:none;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
  .add-xp-mini:hover{border-color:var(--accent);color:var(--accent);}
  .add-member-btn{width:100%;padding:10px;background:none;border:none;border-top:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:5px;}
  .add-member-btn:hover{color:var(--accent3);}
  .log-list{display:flex;flex-direction:column;gap:7px;}
  .log-entry{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  .log-icon{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:var(--surface2);}
  .log-body{flex:1;}
  .log-who{font-size:13px;font-weight:700;}
  .log-what{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:1px;}
  .log-xp{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:800;color:var(--accent);}
  .log-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);}
  .log-team-tag{font-size:10px;color:var(--accent2);font-family:'JetBrains Mono',monospace;background:rgba(124,106,255,0.1);padding:2px 6px;border-radius:10px;border:1px solid rgba(124,106,255,0.2);}
  .empty-log{text-align:center;padding:40px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;}
  .perks-section{margin-bottom:28px;}
  .perks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
  .perk-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:transform 0.15s;}
  .perk-card:hover{transform:translateY(-2px);}
  .perk-actions{display:flex;gap:5px;margin-top:10px;}
  .perk-edit-btn{flex:1;padding:4px 8px;background:none;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:5px;cursor:pointer;}
  .perk-edit-btn:hover{color:var(--text);border-color:var(--accent);}
  .perk-del-btn{padding:4px 8px;background:none;border:1px solid rgba(255,68,102,0.2);color:var(--danger);font-family:'JetBrains Mono',monospace;font-size:10px;border-radius:5px;cursor:pointer;}
  .perk-edit-form{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;}
  .fi{background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:7px 10px;outline:none;width:100%;}
  .fi:focus{border-color:var(--accent);}
  .mgmt-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap;transition:background 0.1s;}
  .mgmt-row:hover{background:var(--surface2);}
  .mgmt-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .mb{padding:5px 12px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;cursor:pointer;border-radius:6px;transition:all 0.12s;}
  .mb:hover{color:var(--text);background:var(--surface2);}
  .mb.del{color:var(--danger);border-color:rgba(255,68,102,0.3);}
  .mb.save{background:var(--accent);color:#000;border-color:transparent;font-weight:700;}
  .mi{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:6px 10px;outline:none;}
  .mi:focus{border-color:var(--accent);}
  .ms{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;padding:6px 10px;outline:none;}
  .ms option{background:var(--surface2);}
  .ef{padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;}
  .efg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:12px;}
  .el{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:4px;}
  .tier-row{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap;margin-bottom:6px;}
  .tier-edit-form{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:6px;}
  .tier-edit-grid{display:grid;grid-template-columns:70px 1fr 1fr;gap:10px;margin-bottom:12px;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:340px;max-width:calc(100vw - 32px);}
  .modal-title{font-size:17px;font-weight:800;margin-bottom:18px;}
  .modal-field{margin-bottom:12px;}
  .modal-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:5px;display:block;}
  .modal-input,.modal-select{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;}
  .modal-input:focus,.modal-select:focus{border-color:var(--accent);}
  .modal-select option{background:var(--surface2);}
  .modal-actions{display:flex;gap:8px;margin-top:18px;}
  .modal-btn{flex:1;padding:9px;border-radius:7px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;}
  .modal-btn-primary{background:var(--accent);color:#000;}
  .modal-btn-cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .xp-burst{position:fixed;pointer-events:none;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:20px;color:var(--accent);z-index:999;animation:burstUp 0.9s ease forwards;}
  @keyframes burstUp{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-38px) scale(1.2)}100%{opacity:0;transform:translateY(-75px) scale(0.9)}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--success);color:var(--success);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px 20px;border-radius:8px;z-index:400;white-space:nowrap;animation:tIn 0.2s ease,tOut 0.2s ease 1.8s forwards;}
  @keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes tOut{to{opacity:0;transform:translateX(-50%) translateY(8px)}}
  .tier-banner{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid #ffd700;border-radius:10px;padding:12px 22px;z-index:300;text-align:center;white-space:nowrap;animation:tIn 0.3s ease,tOut 0.3s ease 2.7s forwards;}
  .banner-title{font-size:14px;font-weight:800;color:#ffd700;}
  .banner-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px;}
  @media(max-width:680px){.stats-row{grid-template-columns:repeat(2,1fr);}.nav-btn{padding:5px 9px;font-size:11px;}main{padding:14px;}.tier-edit-grid{grid-template-columns:60px 1fr;}}
</style>
</head>

function sortedTiers(){return[...tiers].sort((a,b)=>a.min-b.min);}
function getTier(xp){const st=sortedTiers();return st.slice().reverse().find(t=>xp>=t.min)||st[0];}
function getNextTier(xp){return sortedTiers().find(t=>xp<t.min);}
function tierProgress(xp){const t=getTier(xp);const n=getNextTier(xp);if(!n)return 100;return Math.round((xp-t.min)/(n.min-t.min)*100);}
function tierBadge(t,small){if(!t)return'';return`<span style="display:inline-flex;align-items:center;gap:4px;padding:${small?'1px 6px':'3px 10px'};border-radius:20px;font-size:${small?'9px':'11px'};font-weight:700;font-family:'JetBrains Mono',monospace;color:${t.color};background:${t.color}20;border:1px solid ${t.color}50">${t.icon} ${t.name}</span>`;}
function dispName(m){return m.nickname||m.name;}
function ini(m){const n=dispName(m);return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function timeAgo(d){const m=Math.floor((Date.now()-new Date(d))/60000);if(m<2)return'just now';if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';}
function teamXP(t){return members.filter(m=>m.team===t).reduce((s,m)=>s+m.xp,0);}

function render(){
  const app=document.getElementById('app');
  if(!currentUser){app.innerHTML=renderLogin();return;}
  if(currentUser==='admin'){
    app.innerHTML=`<header><div class="logo">LEVEL<span>UP</span></div><nav>${['dashboard','leaderboard','teams','log','perks','members','tiers'].map(v=>`<button class="nav-btn ${view===v?'active':''}" onclick="setView('${v}')">${v.charAt(0).toUpperCase()+v.slice(1)}</button>`).join('')}<button class="logout-btn" onclick="logout()">Log out</button></nav></header><main>${renderAdminView()}</main>`;
  } else {
    app.innerHTML=`<header><div class="logo">LEVEL<span>UP</span></div><nav><span style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-right:8px">👋 ${dispName(currentUser)}</span><button class="logout-btn" onclick="logout()">Log out</button></nav></header><main>${renderUserProfile()}</main>`;
  }
}

function renderLogin(){
  return`<div class="login-wrap"><div class="login-card">
    <div class="login-logo">LEVEL<span>UP</span></div>
    <div class="login-sub">Learning Tracker</div>
    <div class="login-tabs">
      <button class="login-tab ${loginTab==='user'?'active':''}" onclick="loginTab='user';loginErr='';render()">Team Member</button>
      <button class="login-tab ${loginTab==='admin'?'active':''}" onclick="loginTab='admin';loginErr='';render()">Admin</button>
    </div>
    ${loginTab==='user'?`
      <div class="login-field"><label class="login-label">Email</label><input class="login-input" id="l-email" type="email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="login-field"><label class="login-label">Password</label><input class="login-input" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    `:`
      <div class="login-field"><label class="login-label">Username</label><input class="login-input" id="l-user" placeholder="admin" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="login-field"><label class="login-label">Password</label><input class="login-input" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    `}
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    ${loginErr?`<div class="login-err">${loginErr}</div>`:''}
  </div></div>`;
}

function doLogin(){
  if(loginTab==='admin'){
    const u=(document.getElementById('l-user')?.value||'').trim();
    const p=(document.getElementById('l-pass')?.value||'').trim();
    if(u===ADMIN_USER&&p===ADMIN_PASS){currentUser='admin';view='dashboard';render();}
    else{loginErr='Invalid admin credentials';render();}
  } else {
    const email=(document.getElementById('l-email')?.value||'').trim().toLowerCase();
    const pass=(document.getElementById('l-pass')?.value||'').trim();
    const m=members.find(m=>m.email.toLowerCase()===email&&m.password===pass);
    if(m){currentUser=m;render();}
    else{loginErr='Email or password not recognised';render();}
  }
}
function logout(){currentUser=null;loginErr='';render();}

    </div>

      <div class="edit-card-title">Change Password</div>

function saveNickname(){const nick=(document.getElementById('p-nick')?.value||'').trim();currentUser.nickname=nick;showToast('Nickname updated');render();}
function saveAvatarColor(c){currentUser.avatarColor=c;showToast('Avatar updated');render();}
function savePassword(){
  const cur=document.getElementById('p-cur')?.value||'';
  const nw=document.getElementById('p-new')?.value||'';
  const con=document.getElementById('p-con')?.value||'';
  if(cur!==currentUser.password){showToast('Current password incorrect');return;}
  if(nw.length<6){showToast('Password must be 6+ characters');return;}
  if(nw!==con){showToast('Passwords do not match');return;}
  currentUser.password=nw;showToast('Password updated!');render();
}

function setView(v){view=v;editingMemberId=null;editingPerkId=null;editingTierId=null;render();}

  if(view==='dashboard') return renderDashboard();

  if(view==='tiers') return renderTiers();
  return '';
}

function renderDashboard(){
  const total=members.reduce((s,m)=>s+m.xp,0);
  const avg=Math.round(total/members.length);
  const top=[...members].sort((a,b)=>b.xp-a.xp)[0];
  const topS=[...members].sort((a,b)=>b.streak-a.streak)[0];
  const maxTXP=Math.max(1,...TEAMS.map(t=>teamXP(t)));
  const ac=['var(--accent)','var(--accent2)','var(--accent3)','var(--danger)'];
  return`<div class="stats-row">${[['Total XP',total.toLocaleString(),members.length+' learners'],['Avg XP',avg.toLocaleString(),'per person'],['Top Performer',top.name,top.xp.toLocaleString()+' XP · '+top.team],['Longest Streak','🔥 '+topS.streak+'d',dispName(topS)]].map((s,i)=>`<div class="stat-card" style="border-bottom:2px solid ${ac[i]}"><div class="stat-label">${s[0]}</div><div class="stat-value" style="font-size:${i>1?'16px':'26px'};margin-top:${i>1?'4px':'0'}">${s[1]}</div><div class="stat-sub">${s[2]}</div></div>`).join('')}</div>
  <div class="teams-grid">${TEAMS.map(t=>{const tx=teamXP(t);const pct=Math.round(tx/maxTXP*100);const ms=members.filter(m=>m.team===t);const topM=[...ms].sort((a,b)=>b.xp-a.xp)[0];const col=TEAM_COLORS[t];return`<div class="team-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-size:15px;font-weight:700;color:${col}">${t}</div><div class="team-xp-badge">${tx.toLocaleString()} XP</div></div><div class="team-bar-wrap"><div class="team-bar" style="width:${pct}%;background:linear-gradient(90deg,${col}88,${col})"></div></div><div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between"><span>${ms.length} members</span><span>⭐ ${topM?dispName(topM):'—'}</span></div></div>`;}).join('')}</div>`;
}

  return`<div class="perk-edit-form" style="margin-bottom:${isNew?'22px':'0'}"><div style="font-size:13px;font-weight:700;margin-bottom:10px">${isNew?'New perk':'Edit perk'}</div><div style="display:grid;grid-template-columns:56px 1fr;gap:8px;margin-bottom:8px"><div><div class="el">Icon</div><input class="fi" id="pe-icon" value="${isNew?'🎁':p.icon}" style="text-align:center;font-size:18px;padding:6px"></div><div><div class="el">Name</div><input class="fi" id="pe-name" value="${isNew?'':p.name}" placeholder="Perk name"></div></div><div style="margin-bottom:8px"><div class="el">Description</div><input class="fi" id="pe-desc" value="${isNew?'':p.desc}" placeholder="Short description"></div><div style="margin-bottom:12px"><div class="el">Tier</div><select class="fi" id="pe-tier">${st.map(t=>`<option value="${t.id}" ${!isNew&&p.tierId===t.id?'selected':''}>${t.icon} ${t.name}</option>`).join('')}</select></div><div style="display:flex;gap:8px"><button class="mb save" onclick="${isNew?'submitAddPerk()':'submitEditPerk('+p.id+')'}">${isNew?'Add':'Save'}</button><button class="mb" onclick="editingPerkId=null;render()">Cancel</button></div></div>`;
}
function submitAddPerk(){const icon=(document.getElementById('pe-icon').value||'🎁').trim();const name=(document.getElementById('pe-name').value||'').trim();const desc=(document.getElementById('pe-desc').value||'').trim();const tierId=parseInt(document.getElementById('pe-tier').value);if(!name)return;perks.push({id:nextId++,icon,name,desc,tierId});editingPerkId=null;showToast(name+' added');}
function submitEditPerk(id){const p=perks.find(p=>p.id===id);if(!p)return;p.icon=(document.getElementById('pe-icon').value||'🎁').trim();p.name=(document.getElementById('pe-name').value||p.name).trim();p.desc=(document.getElementById('pe-desc').value||'').trim();p.tierId=parseInt(document.getElementById('pe-tier').value);editingPerkId=null;showToast(p.name+' updated');}
function deletePerk(id){const p=perks.find(p=>p.id===id);if(!p)return;if(!confirm('Remove "'+p.name+'"?'))return;perks=perks.filter(p=>p.id!==id);showToast(p.name+' removed');}

function renderMembers(){
  const filtered=members.filter(m=>(mgmtFilter==='all'||m.team===mgmtFilter)&&(dispName(m).toLowerCase().includes(mgmtSearch.toLowerCase())||m.team.toLowerCase().includes(mgmtSearch.toLowerCase())||m.email.toLowerCase().includes(mgmtSearch.toLowerCase())));
  return`<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:18px"><div style="font-size:18px;font-weight:800">Members <span style="font-size:13px;color:var(--muted);font-weight:400">${members.length} total</span></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="xp-btn" onclick="exportCSV()">Export CSV</button><button class="xp-btn" style="background:rgba(64,224,192,0.1);border-color:rgba(64,224,192,0.3);color:var(--accent3)" onclick="editingMemberId='new';render()">+ Add Member</button></div></div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center"><input class="mi" placeholder="Search name, email, team..." style="flex:1;min-width:160px;max-width:280px" value="${mgmtSearch}" oninput="mgmtSearch=this.value;render()"><select class="ms" onchange="mgmtFilter=this.value;render()"><option value="all" ${mgmtFilter==='all'?'selected':''}>All teams</option>${TEAMS.map(t=>`<option value="${t}" ${mgmtFilter===t?'selected':''}>${t}</option>`).join('')}</select></div>
  ${editingMemberId==='new'?renderMemberForm(null):''}
  <div style="display:flex;flex-direction:column;gap:6px">${filtered.length===0?`<div class="empty-log">No members found</div>`:''}${filtered.map(m=>editingMemberId===m.id?renderMemberForm(m):renderMgmtRow(m)).join('')}</div>`;
}

function renderMgmtRow(m){
  const tier=getTier(m.xp);const col=TEAM_COLORS[m.team];
  return`<div class="mgmt-row"><div class="mgmt-avatar" style="background:${m.avatarColor}22;color:${m.avatarColor}">${ini(m)}</div><div style="flex:1;min-width:90px"><div style="font-size:13px;font-weight:700">${dispName(m)}</div><div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">${m.email}</div></div><div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap"><span style="color:${col};font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700">${m.team}</span>${tierBadge(tier,true)}<span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent)">${m.xp.toLocaleString()} XP</span></div><div style="display:flex;gap:6px"><button class="mb" onclick="editingMemberId=${m.id};render()">Edit</button><button class="mb del" onclick="removeMember(${m.id})">Remove</button></div></div>`;
}

function renderMemberForm(m){
  const isNew=!m;
  return`<div class="ef" style="margin-bottom:6px"><div style="font-size:13px;font-weight:700;margin-bottom:12px">${isNew?'Add new member':'Edit: '+dispName(m)}</div><div class="efg"><div><div class="el">Name</div><input class="mi" id="ef-name" style="width:100%" value="${isNew?'':m.name}" placeholder="Full name"></div><div><div class="el">Nickname</div><input class="mi" id="ef-nick" style="width:100%" value="${isNew?'':m.nickname||''}" placeholder="Optional"></div><div><div class="el">Email</div><input class="mi" id="ef-email" style="width:100%" value="${isNew?'':m.email}" placeholder="email@company.com"></div><div><div class="el">Password</div><input class="mi" id="ef-pass" style="width:100%" value="${isNew?'':m.password}" placeholder="Password"></div><div><div class="el">Team</div><select class="ms" id="ef-team" style="width:100%">${TEAMS.map(t=>`<option value="${t}" ${!isNew&&m.team===t?'selected':''}>${t}</option>`).join('')}</select></div><div><div class="el">XP</div><input class="mi" id="ef-xp" type="number" style="width:100%" value="${isNew?0:m.xp}" min="0"></div><div><div class="el">Streak (days)</div><input class="mi" id="ef-streak" type="number" style="width:100%" value="${isNew?0:m.streak}" min="0"></div></div><div style="display:flex;gap:8px"><button class="mb save" onclick="${isNew?'submitAddMember()':'submitEditMember('+m.id+')'}">${isNew?'Add member':'Save'}</button><button class="mb" onclick="editingMemberId=null;render()">Cancel</button></div></div>`;
}
function submitAddMember(){const name=(document.getElementById('ef-name').value||'').trim();const nickname=(document.getElementById('ef-nick').value||'').trim();const email=(document.getElementById('ef-email').value||'').trim();const password=(document.getElementById('ef-pass').value||'').trim();const team=document.getElementById('ef-team').value;const xp=Math.max(0,parseInt(document.getElementById('ef-xp').value)||0);const streak=Math.max(0,parseInt(document.getElementById('ef-streak').value)||0);if(!name||!email)return;members.push({id:nextId++,name,nickname,email,password,team,xp,streak,avatarColor:AVATAR_COLORS[members.length%AVATAR_COLORS.length]});editingMemberId=null;showToast(name+' added');}
function submitEditMember(id){const m=members.find(m=>m.id===id);if(!m)return;m.name=(document.getElementById('ef-name').value||m.name).trim();m.nickname=(document.getElementById('ef-nick').value||'').trim();m.email=(document.getElementById('ef-email').value||m.email).trim();m.password=(document.getElementById('ef-pass').value||m.password).trim();m.team=document.getElementById('ef-team').value;m.xp=Math.max(0,parseInt(document.getElementById('ef-xp').value)||0);m.streak=Math.max(0,parseInt(document.getElementById('ef-streak').value)||0);editingMemberId=null;showToast(dispName(m)+' updated');}
function removeMember(id){const m=members.find(m=>m.id===id);if(!m)return;if(!confirm('Remove '+dispName(m)+'?'))return;if(currentUser&&currentUser.id===id){showToast('Cannot remove currently logged-in user');return;}members=members.filter(m=>m.id!==id);showToast(dispName(m)+' removed');}
function exportCSV(){const rows=[['Name','Nickname','Email','Team','XP','Streak','Tier'],...members.map(m=>[m.name,m.nickname||'',m.email,m.team,m.xp,m.streak,getTier(m.xp).name])];const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='levelup-members.csv';a.click();showToast('CSV exported');}

function renderTiers(){
  const st=sortedTiers();
  return`<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:8px"><div style="font-size:18px;font-weight:800">Tiers <span style="font-size:13px;color:var(--muted);font-weight:400">${tiers.length} tiers</span></div><button class="xp-btn" style="background:rgba(64,224,192,0.1);border-color:rgba(64,224,192,0.3);color:var(--accent3)" onclick="editingTierId='new';render()">+ Add Tier</button></div>
  <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:20px">Changes here update tiers across the whole app.</div>
  ${editingTierId==='new'?renderTierForm(null):''}
  <div>${st.map(t=>editingTierId===t.id?renderTierForm(t):`<div class="tier-row"><div style="font-size:22px;width:40px;text-align:center;flex-shrink:0">${t.icon}</div><div style="flex:1;min-width:120px"><div style="font-size:14px;font-weight:700;color:${t.color}">${t.name}</div><div style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-top:2px">${t.min===0?'Starting tier':t.min.toLocaleString()+'+ XP'} · ${members.filter(m=>getTier(m.xp).id===t.id).length} members · ${perks.filter(p=>p.tierId===t.id).length} perks</div></div><div style="display:flex;gap:6px"><button class="mb" onclick="editingTierId=${t.id};render()">Edit</button>${tiers.length>1?`<button class="mb del" onclick="deleteTier(${t.id})">Remove</button>`:''}</div></div>`).join('')}</div>`;
}
function renderTierForm(t){
  const isNew=!t;
  return`<div class="tier-edit-form" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;margin-bottom:14px">${isNew?'Add new tier':'Edit tier'}</div><div class="tier-edit-grid"><div><div class="el">Icon</div><input class="mi" id="te-icon" value="${isNew?'🏅':t.icon}" style="width:100%;text-align:center;font-size:20px;padding:6px"></div><div><div class="el">Name</div><input class="mi" id="te-name" value="${isNew?'':t.name}" placeholder="e.g. Expert" style="width:100%"></div><div><div class="el">Min XP</div><input class="mi" id="te-min" type="number" value="${isNew?'':t.min}" placeholder="0" min="0" style="width:100%" ${!isNew&&t.min===0?'disabled':''}></div></div><div style="margin-bottom:14px"><div class="el">Color (hex)</div><div style="display:flex;gap:8px;align-items:center"><input class="mi" id="te-color" value="${isNew?'#a0a0ff':t.color}" placeholder="#f0c040" style="flex:1" oninput="document.getElementById('te-cp').style.background=this.value"><div id="te-cp" style="width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:${isNew?'#a0a0ff':t.color}"></div></div></div><div style="display:flex;gap:8px"><button class="mb save" onclick="${isNew?'submitAddTier()':'submitEditTier('+t.id+')'}">${isNew?'Add tier':'Save'}</button><button class="mb" onclick="editingTierId=null;render()">Cancel</button></div></div>`;
}
function submitAddTier(){const icon=(document.getElementById('te-icon').value||'🏅').trim();const name=(document.getElementById('te-name').value||'').trim();const min=Math.max(0,parseInt(document.getElementById('te-min').value)||0);const color=(document.getElementById('te-color').value||'#a0a0ff').trim();if(!name)return;tiers.push({id:nextId++,name,icon,min,color});editingTierId=null;showToast(name+' added');}
function submitEditTier(id){const t=tiers.find(t=>t.id===id);if(!t)return;t.icon=(document.getElementById('te-icon').value||t.icon).trim();t.name=(document.getElementById('te-name').value||t.name).trim();if(t.min!==0)t.min=Math.max(0,parseInt(document.getElementById('te-min').value)||0);t.color=(document.getElementById('te-color').value||t.color).trim();editingTierId=null;showToast(t.name+' updated');}
function deleteTier(id){if(tiers.length<=1){showToast('Need at least one tier');return;}const t=tiers.find(t=>t.id===id);if(!t)return;const mc=members.filter(m=>getTier(m.xp).id===id).length;const pc=perks.filter(p=>p.tierId===id).length;if(!confirm(`Remove "${t.name}"?${mc||pc?`\n${mc} member(s) and ${pc} perk(s) will move to adjacent tier.`:''}`))return;const st=sortedTiers();const idx=st.findIndex(x=>x.id===id);const fallback=st[idx-1]||st[idx+1];perks.forEach(p=>{if(p.tierId===id)p.tierId=fallback.id;});tiers=tiers.filter(t=>t.id!==id);showToast(t.name+' removed');}

function openAwardModal(memberId){
  document.getElementById('modal-title').textContent='⭐ Award XP';
  const sel=memberId?members.find(m=>m.id===memberId):null;
  document.getElementById('modal-body').innerHTML=`<div class="modal-field"><label class="modal-label">Member</label><select class="modal-select" id="m-member">${members.map(m=>`<option value="${m.id}" ${sel?.id===m.id?'selected':''}>${dispName(m)} (${m.team})</option>`).join('')}</select></div><div class="modal-field"><label class="modal-label">Activity</label><select class="modal-select" id="m-type" onchange="document.getElementById('cxp').style.display=this.value=='7'?'block':'none'">${XP_TYPES.map((x,i)=>`<option value="${i}">${x.icon} ${x.label}${x.xp?' (+'+x.xp+' XP)':''}</option>`).join('')}</select></div><div class="modal-field" id="cxp" style="display:none"><label class="modal-label">Custom XP</label><input class="modal-input" type="number" id="m-cxp" value="50" min="1"></div><div class="modal-field"><label class="modal-label">Note (optional)</label><input class="modal-input" id="m-note" placeholder="e.g. Completed Azure Fundamentals"></div><div class="modal-actions"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn modal-btn-primary" onclick="submitXP()">Award XP</button></div>`;
  document.getElementById('modal-overlay').style.display='flex';
}
function openAddMemberModal(team){
  document.getElementById('modal-title').textContent='➕ Add Member';
  document.getElementById('modal-body').innerHTML=`<div class="modal-field"><label class="modal-label">Name</label><input class="modal-input" id="nm-name" placeholder="Full name"></div><div class="modal-field"><label class="modal-label">Email</label><input class="modal-input" id="nm-email" placeholder="email@company.com"></div><div class="modal-field"><label class="modal-label">Team</label><select class="modal-select" id="nm-team">${TEAMS.map(t=>`<option value="${t}" ${t===team?'selected':''}>${t}</option>`).join('')}</select></div><div class="modal-actions"><button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button><button class="modal-btn modal-btn-primary" onclick="submitAddFromModal()">Add</button></div>`;
  document.getElementById('modal-overlay').style.display='flex';
}
function submitXP(){
  const mid=parseInt(document.getElementById('m-member').value);
  const ti=parseInt(document.getElementById('m-type').value);
  const xt=XP_TYPES[ti];
  let xp=xt.xp||parseInt(document.getElementById('m-cxp')?.value)||50;
  const note=document.getElementById('m-note').value.trim();
  const m=members.find(m=>m.id===mid);if(!m)return;
  const prevTier=getTier(m.xp).name;
  m.xp+=xp;m.streak+=1;m.lastActivity=new Date();
  const newTier=getTier(m.xp).name;
  xpLog.push({id:nextId++,memberId:m.id,name:dispName(m),team:m.team,type:note||xt.label,icon:xt.icon,xp,time:new Date()});
  closeModal();render();showXpBurst(xp);
  if(newTier!==prevTier)showTierBanner(dispName(m),newTier);
}
function submitAddFromModal(){const name=(document.getElementById('nm-name').value||'').trim();const email=(document.getElementById('nm-email').value||'').trim();const team=document.getElementById('nm-team').value;if(!name||!email)return;members.push({id:nextId++,name,nickname:'',email,password:'ChangeMe!',team,xp:0,streak:0,avatarColor:AVATAR_COLORS[members.length%AVATAR_COLORS.length]});closeModal();render();showToast(name+' added');}
function closeModal(e){if(!e||e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').style.display='none';}
function showXpBurst(xp){const el=document.createElement('div');el.className='xp-burst';el.textContent='+'+xp+' XP';el.style.left=(Math.random()*60+20)+'%';el.style.top='130px';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function showTierBanner(name,tier){const el=document.createElement('div');el.className='tier-banner';el.innerHTML=`<div class="banner-title">Tier Up! ${name} reached ${tier}!</div><div class="banner-sub">New perks unlocked 🎉</div>`;document.body.appendChild(el);setTimeout(()=>el.remove(),3100);}
function showToast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),2100);}

render();
</script>
</body>
</html>
